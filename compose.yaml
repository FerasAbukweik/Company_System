services:
  company-system-api:
    container_name: Company_system.api
    build:
      context: .
      dockerfile: src/Company_System.WebApi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Jwt__Key=${JWT_KEY}
      - ConnectionStrings__Default=Server=company-system-sqlserver;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=company-system-redis:6379
    depends_on:
      company-system-sqlserver:
        condition: service_healthy
      company-system-redis:
        condition: service_healthy

  company-system-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: Company_system.sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  company-system-redis:
    image: redis:7-alpine
    container_name: Company_system.redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqlserver_data:
  redis_data: